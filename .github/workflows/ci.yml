name: CI

on:
  push:
    branches: [main]
  pull_request_target:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # Stage 1: Fast gate
  unit:
    name: Unit + Analysis + Golden
    runs-on: ubuntu-latest
    outputs:
      e2e-workspaces: ${{ steps.set-matrix.outputs.e2e }}
      cross-workspaces: ${{ steps.set-matrix.outputs.cross }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - id: set-matrix
        run: |
          e2e_ws=()
          cross_ws=()
          for d in tests/e2e/* modules/*; do
            if [ -f "$d/MODULE.bazel" ] || [ -f "$d/WORKSPACE" ] || [ -f "$d/WORKSPACE.bazel" ]; then
              ws_name=$(basename "$d")
              if [ "$ws_name" != "shared" ]; then
                if [[ "$ws_name" == build_* ]]; then
                  cross_ws+=("\"$ws_name\"")
                else
                  e2e_ws+=("\"$d\"")
                fi
              fi
            fi
          done
          echo "e2e=[$(IFS=,; echo "${e2e_ws[*]}")]" >> $GITHUB_OUTPUT
          echo "cross=[$(IFS=,; echo "${cross_ws[*]}")]" >> $GITHUB_OUTPUT
      - name: Configure BuildBuddy
        run: |
          echo "build:remote --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}" > .bazelrc.user
      - name: Test
        run: |
          bazel \
            --bazelrc=.github/workflows/ci.bazelrc \
            test --config=remote \
            -- //pycross/... //docs/... //tests/... -//tests/e2e/...

  # Stage 2: E2E integration tests
  e2e:
    name: E2E - ${{ matrix.workspace }} (Bazel ${{ matrix.bazel }})
    needs: [unit]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bazel: ["8.7.0", "9.1.0"]
        workspace: ${{ fromJSON(needs.unit.outputs.e2e-workspaces) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelrc: |
            common --announce_rc
            common --color=yes
            test --test_output=errors
      - name: Configure
        working-directory: ${{ matrix.workspace }}
        run: |
          echo "${{ matrix.bazel }}" > .bazelversion
          echo "build:remote --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}" > .bazelrc.user
      - name: Build
        working-directory: ${{ matrix.workspace }}
        run: |
          if [ -f "run.sh" ]; then
            echo "Skipping default build, run.sh will handle it."
          else
            bazel build --config=remote --experimental_convenience_symlinks=ignore //...
          fi
      - name: Test
        working-directory: ${{ matrix.workspace }}
        run: |
          if [ -f "run.sh" ]; then
            ./run.sh --config=remote
          else
            if bazel query "tests(//...)" 2>/dev/null | grep -q .; then
              bazel test --config=remote --experimental_convenience_symlinks=ignore //...
            else
              echo "No test targets found, skipping."
            fi
          fi

  # Stage 3: Cross-platform builds
  cross-build:
    name: Build - ${{ matrix.workspace }} on ${{ matrix.host }}
    needs: [unit]
    runs-on: ${{ format('{0}-latest', matrix.host) }}
    strategy:
      fail-fast: false
      matrix:
        host: [ubuntu, macos]
        workspace: ${{ fromJSON(needs.unit.outputs.cross-workspaces) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Enable unprivileged user namespaces
        if: matrix.host == 'ubuntu'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Configure BuildBuddy
        run: |
          echo "build:remote --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}" > tests/e2e/${{ matrix.workspace }}/.bazelrc.user
      - name: Build all wheels
        run: cd tests/e2e/${{ matrix.workspace }} && bazel build --config=remote //:all_wheels
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.host }}-${{ matrix.workspace }}
          path: tests/e2e/${{ matrix.workspace }}/bazel-bin/all_wheels/

  # Stage 3b: Test built wheels on target platforms
  cross-test:
    name: Test - (${{ matrix.builder }}→${{ matrix.runner }})
    needs: [cross-build, unit]
    runs-on: ${{ format('{0}-latest', matrix.runner) }}
    strategy:
      fail-fast: false
      matrix:
        builder: [ubuntu, macos]
        runner: [ubuntu, macos]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Enable unprivileged user namespaces
        if: matrix.runner == 'ubuntu'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@v6
        with:
          pattern: wheels-${{ matrix.builder }}-*
          path: ${{ runner.temp }}/artifacts
      - name: Test workspaces
        run: |
          for ws in ${{ join(fromJSON(needs.unit.outputs.cross-workspaces), ' ') }}; do
            echo "::group::Testing $ws"

            python -m venv ${{ runner.temp }}/venv-$ws
            source ${{ runner.temp }}/venv-$ws/bin/activate

            mkdir -p ${{ runner.temp }}/install-wheels-$ws
            artifact_dir="${{ runner.temp }}/artifacts/wheels-${{ matrix.builder }}-$ws"

            if [ "${{ matrix.runner }}" = "ubuntu" ]; then
              cp $artifact_dir/*linux*.whl ${{ runner.temp }}/install-wheels-$ws/ 2>/dev/null || true
            else
              cp $artifact_dir/*macosx*.whl ${{ runner.temp }}/install-wheels-$ws/ 2>/dev/null || true
            fi
            cp $artifact_dir/*none-any*.whl ${{ runner.temp }}/install-wheels-$ws/ 2>/dev/null || true
            if ! ls ${{ runner.temp }}/install-wheels-$ws/*.whl 1> /dev/null 2>&1; then
              echo "Error: No wheels found to install for $ws"
              exit 1
            fi

            pip install pytest ${{ runner.temp }}/install-wheels-$ws/*.whl
            cd tests/e2e/$ws
            python -m pytest tests/ -v
            cd ../../..

            deactivate
            echo "::endgroup::"
          done

  # Stage 3c: Reproducibility check
  reproducibility:
    name: Repro check
    needs: [cross-build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@v6
        with:
          pattern: wheels-ubuntu-*
          path: ${{ runner.temp }}/linux-wheels
          merge-multiple: true
      - uses: actions/download-artifact@v6
        with:
          pattern: wheels-macos-*
          path: ${{ runner.temp }}/macos-wheels
          merge-multiple: true
      - name: Compare wheels
        run: python tests/e2e/tools/compare_wheels.py ${{ runner.temp }}/linux-wheels ${{ runner.temp }}/macos-wheels

  # Gate for branch protection
  conclusion:
    needs: [unit, e2e, cross-test, reproducibility]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: technote-space/workflow-conclusion-action@45ce8e0eb155657ab8ccf346ade734257fd196a5  # v3.0.3
      - name: Report
        run: |
          echo "Workflow conclusion: $WORKFLOW_CONCLUSION"
          [ "$WORKFLOW_CONCLUSION" = "success" ] && exit 0 || exit 1
