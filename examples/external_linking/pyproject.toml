version = "0.1"
description = "rules_pycross"
authors = []
dependencies = [
    "ipython>=8.0.1",
    "numpy==2.2.6",
    "pandas==2.2.3",
    "Cython>=3.0.6",
    "setuptools==69.5.1",
    "wheel==0.37.0",
    "meson-python>=0.15.0",
    "meson",
    "ninja",
    "psycopg2==2.9.10",
    "setproctitle==1.3.2",
    "versioneer[toml]",
    "contourpy==1.3.1",
    "pywavelets==1.8.0",
    "rpds-py==0.23.0",
    "tomli==2.2.1",
    "pyproject-metadata==0.8.1",
    "filelock==3.17.0",
    "pybind11",
    "maturin",
