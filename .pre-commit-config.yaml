# See CONTRIBUTING.md for instructions.
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# Commitizen runs in commit-msg stage
# but we don't want to run the other hooks on commit messages
default_stages: [pre-commit]

exclude: (^third_party/.*$|\.lock$|^docs/.*\.md$)
repos:
  # Check formatting and lint for starlark code
  - repo: https://github.com/keith/pre-commit-buildifier
    rev: 8.5.1.1
    hooks:
      - id: buildifier
      - id: buildifier-lint
        args: ["--warnings=-canonical-repository"]
  # - repo: https://github.com/commitizen-tools/commitizen
  #   rev: v2.18.0
  #   hooks:
  #     # Requires that commitizen is already installed
  #     - id: commitizen
  #       stages: [commit-msg]

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --show-fixes]
      - id: ruff-format
  - repo: https://github.com/codespell-project/codespell
    rev: "v2.4.2"
    hooks:
      - id: codespell
        args: ["-L", "sur"]
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: "v1.10.0"
    hooks:
      - id: rst-backticks
      - id: rst-directive-colons
      - id: rst-inline-touching-normal

  - repo: https://github.com/MarcoGorelli/absolufy-imports
    rev: v0.3.1
    hooks:
      - id: absolufy-imports
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: pretty-format-json
        args: [--autofix]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-d, "{rules: {document-start: disable}}"]

  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.37
    hooks:
      - id: pymarkdown
        args: ["-d", "MD013,MD033,MD024,MD037,MD041,MD034,MD001,MD026,MD040", "scan"]

  - repo: local
    hooks:
      - id: gazelle-root
        name: gazelle (root)
        entry: bazel run //:gazelle
        language: system
        pass_filenames: false
        types: [bazel]
      - id: gazelle-maturin
        name: gazelle (maturin)
        entry: bash -c "cd modules/backend_maturin && bazel run //gazelle:gazelle"
        language: system
        pass_filenames: false
        types: [bazel]
        files: ^modules/backend_maturin/
      - id: docs-update
        name: docs update
        entry: bash -c "cd docs && bazel run //:update"
        language: system
        pass_filenames: false
        types: [bazel]
